name: Bipolar Disorder Daily Report

on:
  schedule:
    - cron: "0 3 * * *" # UTC 03:00 = 台北時間 11:00
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Extract existing PMIDs from past 7 days
        run: |
          python -c "
          import glob, re, json
          from datetime import datetime, timedelta
          pmids = set()
          for i in range(1, 8):
              d = (datetime.now() - timedelta(days=i)).strftime('%Y-%m-%d')
              pattern = f'docs/bipolar-{d}.html'
              files = glob.glob(pattern)
              for f in files:
                  with open(f, 'r', encoding='utf-8') as fh:
                      html = fh.read()
                  found = re.findall(r'pubmed\.ncbi\.nlm\.nih\.gov/(\d+)', html)
                  pmids.update(found)
          with open('existing_pmids.json', 'w') as fh:
              json.dump(sorted(pmids), fh)
          print(f'Found {len(pmids)} existing PMIDs from past 7 days')
          "

      - name: Fetch papers from PubMed
        run: |
          python scripts/fetch_papers.py \
            --days 7 \
            --max-papers 50 \
            --json \
            --output papers.json \
            --exclude existing_pmids.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(python -c "import json; print(json.load(open('papers.json')).get('count',0))")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/generate_report.py \
            --input papers.json \
            --output docs/bipolar-${{ steps.date.outputs.target }}.html \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: python scripts/generate_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "bipolar daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "### Bipolar Brain Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [bipolar-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/bipolar-brain/bipolar-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
